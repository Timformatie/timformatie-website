<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pagina niet gevonden (404) | Timformatie</title>
<meta name="robots" content="noindex, follow">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:'Source Sans 3',-apple-system,'Segoe UI',Arial,sans-serif;color:#F5F1E8;background:radial-gradient(120% 120% at 78% 12%, #16384e 0%, #0F2A3D 52%, #0a2030 100%);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  a{color:inherit}
  ::selection{background:#5EE3B1;color:#0F2A3D}
  @keyframes floatA{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(6px,-22px) rotate(7deg)}}
  @keyframes floatB{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(14px,18px) rotate(-9deg)}}
  @keyframes floatC{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-14px,14px) rotate(5deg)}}
  @media(prefers-reduced-motion:reduce){[data-float]{animation:none !important}}
  @media(max-width:700px){
    [data-shape]{display:none !important}
    [data-404]{font-size:38vw !important}
  }
</style>
<meta name="color-scheme" content="light">
<link rel="stylesheet" href="/assets/fonts/fonts.css">
</head>
<body>

<header style="position:relative;z-index:3;padding:22px 40px;">
  <a href="/" style="display:inline-flex;align-items:center;gap:11px;text-decoration:none;">
    <img src="assets/logo/logo-cream.png" alt="Timformatie logo" width="30" height="32" style="display:block;width:30px;height:auto;">
    <span style="font-family:'Archivo',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.02em;color:#F5F1E8;">timformatie<span style="color:#5EE3B1;">.</span></span>
  </a>
</header>

<main style="position:relative;z-index:2;flex:1;display:flex;align-items:center;padding:20px 40px 80px;">
  <div data-float data-shape style="position:absolute;right:10%;top:8%;width:104px;height:104px;background:#C8A04A;border-radius:10px;box-shadow:0 20px 50px rgba(0,0,0,0.25);animation:floatA 9s ease-in-out infinite;z-index:1;"></div>
  <div data-float data-shape style="position:absolute;right:24%;bottom:14%;width:60px;height:60px;background:#EE6A5A;border-radius:8px;box-shadow:0 16px 36px rgba(0,0,0,0.22);animation:floatB 11s ease-in-out infinite;z-index:1;"></div>
  <div data-float data-shape style="position:absolute;right:6%;bottom:24%;width:88px;height:88px;border:2px solid #5F8368;border-radius:10px;animation:floatC 13s ease-in-out infinite;z-index:1;"></div>
  <div data-float data-shape style="position:absolute;right:33%;top:22%;width:24px;height:24px;background:#5EE3B1;border-radius:5px;box-shadow:0 0 30px rgba(94,227,177,0.5);animation:floatA 7s ease-in-out infinite;z-index:1;"></div>

  <div style="position:relative;z-index:2;max-width:1280px;width:100%;margin:0 auto;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.18em;text-transform:uppercase;color:#5EE3B1;font-weight:600;margin-bottom:18px;">Foutcode 404</div>
    <div data-404 aria-hidden="true" style="font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(120px,22vw,300px);line-height:0.86;letter-spacing:-0.04em;color:#F5F1E8;margin:0 0 8px;">404<span style="color:#5EE3B1;">.</span></div>
    <h1 style="font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,3.4vw,46px);line-height:1.04;letter-spacing:-0.02em;color:#F5F1E8;margin:0 0 18px;max-width:18ch;">Deze pagina konden we niet vinden.</h1>
    <p style="font-size:clamp(17px,1.5vw,20px);line-height:1.55;color:rgba(245,241,232,0.78);max-width:560px;margin:0 0 36px;">De pagina is mogelijk verplaatst of bestaat niet meer. Geen zorgen, we brengen je weer op weg.</p>
    <div style="display:flex;flex-wrap:wrap;gap:14px;">
      <a href="/" style="display:inline-flex;align-items:center;gap:9px;background:#EE6A5A;color:#FBF9F2;font-weight:700;font-size:16px;padding:15px 28px;border-radius:8px;text-decoration:none;box-shadow:0 8px 24px rgba(238,106,90,0.3);">&#8592; Terug naar de homepagina</a>
      <a href="/contact.html" style="display:inline-flex;align-items:center;gap:9px;background:rgba(245,241,232,0.06);color:#F5F1E8;font-weight:600;font-size:16px;padding:15px 28px;border-radius:8px;border:1px solid rgba(245,241,232,0.28);text-decoration:none;">Neem contact op</a>
    </div>
  </div>
</main>

</body>
</html>
